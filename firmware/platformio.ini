; PlatformIO project for the ESP32-DevKitC + Waveshare RGB Matrix Adapter Board (E)
; Subscribes to an MQTT topic on the Mac and renders 64x32 raw-RGB frames.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_port = /dev/cu.usbserial-0001
upload_port = /dev/cu.usbserial-0001
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.11
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit GFX Library@^1.11.10
    adafruit/Adafruit BusIO@^1.16.1
